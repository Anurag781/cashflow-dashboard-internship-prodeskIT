<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cash-Flow Tracker</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container">

<h1>Cash-Flow Tracker</h1>

<div class="salary-box">
<input type="number" id="salaryInput" placeholder="Enter Total Salary">
<button id="setSalary">Set Salary</button>
</div>

<div class="expense-box">

<h2>Add Expense</h2>

<input type="text" id="expenseName" placeholder="Expense Name">
<input type="number" id="expenseAmount" placeholder="Expense Amount">

<button id="addExpense">Add Expense</button>

</div>

<div class="summary">

<div class="card">
<h3>Total Salary</h3>
<p id="salaryDisplay">₹0</p>
</div>

<div class="card">
<h3>Total Expenses</h3>
<p id="expenseDisplay">₹0</p>
</div>

<div class="card">
<h3>Balance</h3>
<p id="balanceDisplay">₹0</p>
</div>

</div>

<h2>Expense List</h2>

<table>

<thead>
<tr>
<th>Name</th>
<th>Amount</th>
<th>Action</th>
</tr>
</thead>

<tbody id="expenseTable"></tbody>

</table>

<div class="chart-container">
<canvas id="expenseChart"></canvas>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
